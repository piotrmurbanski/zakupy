name: Mobile CI

on:
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-*.yml'
      - 'docs/codex-mobile-actions.md'
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-*.yml'
      - 'docs/codex-mobile-actions.md'

jobs:
  mobile-test-and-android-build:
    runs-on: ubuntu-latest
    env:
      FLUTTER_BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: sh mobile/scripts/codex-mobile-action.sh pub-get

      - name: Run Flutter tests
        run: flutter test
        working-directory: mobile

      - name: Build Android APK
        run: sh mobile/scripts/codex-mobile-action.sh build-android-apk

  mobile-ios-build:
    runs-on: macos-latest
    env:
      FLUTTER_BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build iOS app without codesign
        run: sh mobile/scripts/codex-mobile-action.sh build-ios
