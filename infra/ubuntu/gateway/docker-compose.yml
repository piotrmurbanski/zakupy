services:
  caddy:
    image: caddy:2-alpine
    container_name: zakupy-caddy-gateway
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_DEV_PORT:-8080}:${CADDY_DEV_PORT:-8080}"
    environment:
      TAILSCALE_HOSTNAME: ${TAILSCALE_HOSTNAME}
      CADDY_DEV_PORT: ${CADDY_DEV_PORT}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public

volumes:
  caddy_data:
  caddy_config:

networks:
  public:
    external: true
    name: zakupy-public
